name: Check and Format Code

on:
  push:
    branches: [ main, dev, developing, feature/** ]
  pull_request:
    branches: [ main, dev ]

jobs:
  format-code:
    name: Check and Format Code with rustfmt
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt
    
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    
    - name: Check code formatting
      id: check-format
      continue-on-error: true
      run: cargo fmt --check
    
    - name: Format code (always run)
      continue-on-error: true
      run: cargo fmt --all
    
    - name: Check again after formatting
      continue-on-error: true
      run: cargo fmt --check
    