name: Check and Format Code

on:
  push:
    branches: [ main, dev, developing, feature/** ]
  pull_request:
    branches: [ main, dev ]

jobs:
  format-code:
    name: Check and Format Code with rustfmt
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout with SSH
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}  # 使用SSH密钥进行身份验证
        ssh-strict: false  # 可选：关闭严格的SSH主机密钥检查
    
    - name: Configure SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        # 添加GitHub到已知主机，防止中间人攻击
        ssh-keyscan github.com >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt
    
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    
    - name: Check code formatting
      id: check-format
      continue-on-error: true
      run: cargo fmt --check
    
    - name: Format code (only if needed)
      if: steps.check-format.outcome == 'failure'
      continue-on-error: true
      run: cargo fmt --all
    
    - name: Check again after formatting
      if: steps.check-format.outcome == 'failure'
      continue-on-error: true
      run: cargo fmt --check
    
    - name: Configure git user
      run: |
        git config user.name "Ink-dark"
        git config user.email "d16671480856@163.com"
    
    - name: Check for formatting changes
      id: git-check
      run: |
        git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT
    
    - name: Commit formatting changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git add .
        git commit -m "chore: auto-format code"
    
    - name: Push changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git push origin ${{ github.ref }}
    