name: Check and Format Code

on:
  push:
    branches: [ main, dev, developing, feature/** ]
  pull_request:
    branches: [ main, dev ]

jobs:
  format-code:
    name: Check and Format Code with rustfmt
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt
    
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    
    - name: Check code formatting
      id: check-format
      continue-on-error: true
      run: cargo fmt --check
    
    - name: Format code (always run)
      continue-on-error: true
      run: cargo fmt --all
    
    - name: Check again after formatting
      continue-on-error: true
      run: cargo fmt --check
    
    - name: Configure git user
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Check for formatting changes
      id: git-check
      run: |
        git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT
    
    - name: Commit formatting changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git add .
        git commit -m "chore: auto-format code"
    
    - name: Push changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git push https://x-access-token:${{ secrets.PAT_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ github.ref }}
    