name: MoDa Browser Core CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 顺序执行的平台构建作业
  build-test-ubuntu:
    name: Build and Test on Ubuntu
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    
    - name: Check formatting
      run: cargo fmt --check
    
    - name: Clippy linting
      run: cargo clippy -- -D warnings
    
    - name: Build project
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Check doc compilation
      run: cargo doc --no-deps --document-private-items
  
  build-test-windows:
    name: Build and Test on Windows
    runs-on: windows-latest
    needs: build-test-ubuntu  # 依赖于Ubuntu构建完成
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    
    - name: Build project
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
  
  build-test-macos:
    name: Build and Test on macOS
    runs-on: macos-latest
    needs: build-test-windows  # 依赖于Windows构建完成
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    
    - name: Check formatting
      run: cargo fmt --check
    
    - name: Clippy linting
      run: cargo clippy -- -D warnings
    
    - name: Build project
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Check doc compilation
      run: cargo doc --no-deps --document-private-items
  
  # 安全检查作业，依赖于所有平台构建完成
  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    needs: [build-test-ubuntu, build-test-windows, build-test-macos]  # 依赖于所有平台构建完成
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run cargo audit
      run: cargo audit
  
  # CMake构建作业，顺序执行
  build-cmake-ubuntu:
    name: Build with CMake on Ubuntu
    runs-on: ubuntu-latest
    needs: security-check  # 依赖于安全检查完成
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.20.x'
    
    - name: Create build directory
      run: mkdir -p build
      shell: bash
    
    - name: Configure CMake
      run: cmake ..
      working-directory: build
    
    - name: Build with CMake
      run: cmake --build .
      working-directory: build
  
  build-cmake-macos:
    name: Build with CMake on macOS
    runs-on: macos-latest
    needs: build-cmake-ubuntu  # 依赖于Ubuntu CMake构建完成
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.20.x'
    
    - name: Create build directory
      run: mkdir -p build
      shell: bash
    
    - name: Configure CMake
      run: cmake ..
      working-directory: build
    
    - name: Build with CMake
      run: cmake --build .
      working-directory: build
